# CES Example Configuration — Huawei Cloud Cloud Eye Service

> **YAML anchors**: `_base_alarm: &base_alarm` captures the standard
> `period` / `evaluation_periods` / `comparison_operator` for ECS / RDS
> alarms. Templates override only `metric_name`, `threshold`, and `name`.

```yaml
_base_alarm: &base_alarm
  period: 300
  comparison_operator: "GE"
  evaluation_periods: 3
_smn_critical: &smn_critical
  - "urn:smn:{{env.HW_REGION_ID}}:{{env.HW_PROJECT_ID}}:ces-critical-alerts"
_smn_warning: &smn_warning
  - "urn:smn:{{env.HW_REGION_ID}}:{{env.HW_PROJECT_ID}}:ces-warning-alerts"

ces:
  region: cn-north-4
  project_id: "{{env.HW_PROJECT_ID}}"

  alarm_defaults:
    evaluation_periods: 3
    period: 300
    alarm_level: 2
    comparison_operator: "GE"

  ecs_alarm_templates:
    - <<: *base_alarm
      name: "ecs-cpu-critical"
      namespace: "SYS.ECS"
      metric_name: "cpu_util"
      threshold: 95
      alarm_level: 1
      evaluation_periods: 2
      alarm_actions: *smn_critical
    - <<: *base_alarm
      name: "ecs-cpu-warning"
      namespace: "SYS.ECS"
      metric_name: "cpu_util"
      threshold: 80
      alarm_level: 2
      alarm_actions: *smn_warning
    - <<: *base_alarm
      name: "ecs-memory-warning"
      namespace: "AGT.ECS"
      metric_name: "memory_util"
      threshold: 85
    - <<: *base_alarm
      name: "ecs-disk-warning"
      namespace: "AGT.ECS"
      metric_name: "disk_util"
      threshold: 85

  rds_alarm_templates:
    - <<: *base_alarm
      name: "rds-cpu-warning"
      namespace: "SYS.RDS"
      metric_name: "rds001_cpu_util"
      threshold: 80
    - <<: *base_alarm
      name: "rds-connection-warning"
      namespace: "SYS.RDS"
      metric_name: "rds003_conn_usage"
      threshold: 90
      alarm_level: 1
      evaluation_periods: 2

  dashboard_templates:
    - name: "infrastructure-overview"
      description: "CPU, Memory, Disk utilization across all ECS instances"
      panels:
        - title: "ECS CPU Utilization"
          namespace: "SYS.ECS"
          metric_name: "cpu_util"
          period: "60"
          aggregation: "avg"
        - title: "ECS Memory Utilization"
          namespace: "AGT.ECS"
          metric_name: "memory_util"
          period: "60"
          aggregation: "avg"
        - title: "RDS CPU Utilization"
          namespace: "SYS.RDS"
          metric_name: "rds001_cpu_util"
          period: "60"
          aggregation: "avg"

finops:
  budget_alert_thresholds: &budget_thresholds
    - 80
    - 90
    - 100
  idle_alarm_threshold_days: 90
  max_monitoring_granularity_seconds: 300

gcl_quality: &gcl_quality
  pass_rate_warn: 0.85
  pass_rate_critical: 0.70
  max_iter_warn_count: 3
  safety_fail_alert: true

aiops:
  storm_detection: &storm_detection
    max_alarms_per_window: 10
    window_minutes: 5
    same_resource_max: 3
  anomaly_patterns:
    - name: "cpu_mem_dual_high"
      description: "CPU > 90% AND Memory > 85% simultaneously"
      severity: "Critical"
    - name: "disk_io_bottleneck"
      description: "Disk IOPS > threshold AND disk_util > 90%"
      severity: "Warning"
    - name: "mem_leak_trend"
      description: "Memory utilization slope > 0.5%/min over 30 min"
      severity: "Critical"
    - name: "sudden_cpu_spike"
      description: "CPU delta > 50% within 5 minutes"
      severity: "Warning"
```
