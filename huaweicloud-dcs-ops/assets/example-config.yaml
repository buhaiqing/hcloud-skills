# DCS Example Configuration — Huawei Cloud Distributed Cache Service

```yaml
# DCS alarm thresholds
alarm_thresholds:
  cpu_util: 80
  memory_util: 85
  connection_usage: 90
  inbound_bandwidth_usage: 80

# Idle instance detection window (days)
idle_detection:
  cpu_below_threshold_days: 7
  memory_below_threshold_days: 14
  zero_connections_days: 3
  min_cpu_threshold: 5

# Default backup configuration
backup_defaults: &backup_defaults
  backup_type: "auto"
  save_days: 7
  period: "00:00-01:00"

backup_policies:
  - <<: *backup_defaults
    name: "dcs-daily-backup"
    save_days: 30
  - <<: *backup_defaults
    name: "dcs-weekly-backup"
    save_days: 90
    period: "02:00-04:00"

# FinOps cost optimization
finops:
  idle_cpu_threshold_percent: 10
  idle_window_days: 7
  min_recommend_savings_cny: 50
  utilization_target: 70
```

