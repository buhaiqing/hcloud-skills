name: Validate Skills

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Ruff Python lint
        uses: astral-sh/ruff-action@v3
        with:
          version: 0.11.8
          args: check --output-format=github .

      - name: Python unit tests
        run: |
          cd scripts
          python3 -m unittest discover -p "*_test.py" -v

      - name: Local validation suite
        run: python3 scripts/validate_local.py

      - name: Generator GCL contract
        run: python3 scripts/check_generator_contract.py

      - name: GCL Tier-A conformance
        run: python3 scripts/check_gcl_conformance.py

      - name: GCL alarm wire plan (no mutations)
        run: |
          python3 scripts/gcl_alarm_wire.py plan \
            --summary scripts/fixtures/gcl-quality-summary-healthy.json
