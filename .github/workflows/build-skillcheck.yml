name: Build skillcheck

# Cross-platform build + release of the `skillcheck` Go binary.
# The module lives in the `skillcheck/` subdirectory, so every Go step runs
# with `working-directory: skillcheck`. On a `v*` tag push, the matrix
# artifacts are published as a GitHub Release so external users can download a
# standalone binary with no Go toolchain (see docs/superpowers/specs/skillcheck-cli.md).

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:

permissions:
  contents: write # needed to publish release assets on tag push

env:
  MODULE_DIR: skillcheck
  GO_VERSION: "1.26"

jobs:
  test:
    name: Test & lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: skillcheck
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Verify gofmt is clean
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "These files need gofmt:"; echo "$unformatted"; exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test ./... -count=1

  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { goos: linux, goarch: amd64 }
          - { goos: linux, goarch: arm64 }
          - { goos: darwin, goarch: amd64 }
          - { goos: darwin, goarch: arm64 }
          - { goos: windows, goarch: amd64 }
          - { goos: windows, goarch: arm64 }
    defaults:
      run:
        working-directory: skillcheck
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          bin="skillcheck"
          if [ "${{ matrix.goos }}" = "windows" ]; then bin="skillcheck.exe"; fi
          out="skillcheck-${{ matrix.goos }}-${{ matrix.goarch }}"
          mkdir -p ../dist
          go build -trimpath -ldflags="-s -w" -o "../dist/${out}" .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: skillcheck-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/skillcheck-${{ matrix.goos }}-${{ matrix.goarch }}*

  release:
    name: Release (tagged)
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/skillcheck-*
          generate_release_notes: true
