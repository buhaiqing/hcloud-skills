## Cost Optimization Profile

```yaml
# huaweicloud-rds-ops/config/cost-optimization.yaml

_base: &utilization_target
  target: "60-70%"
  alert_above: "80%"
  action_below: recommend_downgrade

metadata:
  profile: cost-optimization
  version: "1.0.0"

utilization_targets:
  cpu:
    <<: *utilization_target
  memory:
    target: "70-80%"
    alert_above: "85%"
    action_below: recommend_downgrade
  connections:
    target: "50-70%"
    alert_above: "80%"
    action_below: recommend_downgrade

scheduled_actions:
  - name: weekly_review
    schedule: "0 9 * * MON"
    actions:
      - list_idle_instances
      - report_right_sizing_candidates
      - cleanup_orphaned_backups
  - name: monthly_report
    schedule: "0 9 1 * *"
    actions:
      - generate_cost_report
      - compare_with_previous_month
      - update_budget_forecast

auto_remediation:
  idle_detection:
    enabled: true
    cpu_threshold: 5
    days_threshold: 7
    action: notify
  right_sizing:
    enabled: false
    auto_approve_threshold: 20
```

