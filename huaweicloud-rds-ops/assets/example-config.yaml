## Cost Optimization Profile

```yaml
# huaweicloud-rds-ops/config/cost-optimization.yaml

metadata:
  profile: cost-optimization
  version: "1.0.0"

# Resource Utilization Targets
utilization_targets:
  cpu:
    target: 60-70%
    alert_above: 80%
    action_below: recommend_downgrade
  memory:
    target: 70-80%
    alert_above: 85%
    action_below: recommend_downgrade
  connections:
    target: 50-70%
    alert_above: 80%
    action_below: recommend_downgrade

# Scheduled Actions
scheduled_actions:
  - name: weekly_review
    schedule: "0 9 * * MON"
    actions:
      - list_idle_instances
      - report_right_sizing_candidates
      - cleanup_orphaned_backups
  - name: monthly_report
    schedule: "0 9 1 * *"
    actions:
      - generate_cost_report
      - compare_with_previous_month
      - update_budget_forecast

# Auto-Remediation (with approval)
auto_remediation:
  idle_detection:
    enabled: true
    cpu_threshold: 5
    days_threshold: 7
    action: notify  # Notify only, no auto-action
  right_sizing:
    enabled: false  # Requires approval
    auto_approve_threshold: 20
```

