## Environment: Development

```yaml
# huaweicloud-rds-ops/config/development.yaml

metadata:
  environment: development
  version: "1.0.0"
  last_updated: "2026-05-20"

# RDS Instance Configuration
instance:
  engine: MySQL
  engine_version: "8.0"
  flavor_ref: rds.mysql.s1.medium
  volume_type: ULTRAHIGH
  volume_size: 40
  ha_mode: false
  replication_mode: ""

# Network Configuration
network:
  vpc_id: vpc-dev-xxxxx
  subnet_id: subnet-dev-private-xxxxx
  security_group_id: sg-rds-mysql-dev-xxxxx
  availability_zone: cn-north-4a

# Backup Configuration
backup:
  auto_enabled: true
  start_time: "04:00-05:00"
  keep_days: 1
  cross_region_enabled: false

# Security Configuration
security:
  ssl_enabled: false
  tde_enabled: false
  require_secure_transport: false
  min_password_length: 8

# Monitoring Configuration
monitoring:
  ces_enabled: true
  alarm_enabled: false  # No alerts for dev
  metrics:
    - cpu_usage
    - mem_usage
    - disk_usage

# Alert Thresholds (relaxed for development)
alerts:
  cpu:
    warning: 90
    critical: 95
    duration_minutes: 15
  memory:
    warning: 90
    critical: 95
    duration_minutes: 15
  connections:
    warning: 90
    critical: 95
    duration_minutes: 10
  disk:
    warning: 90
    critical: 95
    duration_minutes: 10

# FinOps Configuration
finops:
  cost_center_tag: "CC-DEV-001"
  environment_tag: "dev"
  budget_alert_threshold: 1.0
  idle_detection:
    cpu_threshold: 10
    days_threshold: 1
    action: delete  # Auto-delete for dev
  right_sizing:
    cpu_low_threshold: 40
    mem_low_threshold: 50
    days_threshold: 3
    action: recommend

# SecOps Configuration
secops:
  iam_policy:
    allowed_actions:
      - rds:instance:get
      - rds:instance:list
      - rds:instance:create
      - rds:instance:delete
    resource_scope: "acs:rds:*:*:instance/*"
  security_group_rules:
    ingress:
      - protocol: TCP
        port: 3306
        source: 0.0.0.0/0  # Open for dev
    egress:
      - protocol: TCP
        port: 3306
        destination: 0.0.0.0/0
  credential_rotation_days: 180

# AIOps Configuration
aiops:
  anomaly_detection:
    enabled: false
  proactive_inspection:
    enabled: false
  alarm_storm:
    enabled: false
```

