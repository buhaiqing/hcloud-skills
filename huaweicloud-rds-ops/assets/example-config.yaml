# Example Configuration — Huawei Cloud RDS

> **Purpose:** Example YAML configuration for RDS skill with FinOps, SecOps, and AIOps settings.
> **Version:** 1.0.0
> **Last Updated:** 2026-05-20

> **YAML anchors**: `_base: &base` and `_engine: &engine` capture shared
> values (engine type/version, IAM allowed actions, common metric set,
> SG rules). Environments override only what differs.

---

## Environment: Production

```yaml
# huaweicloud-rds-ops/config/production.yaml

_base: &base
  metadata:
    version: "1.0.0"
    last_updated: "2026-05-20"
  _engine: &engine
    engine: MySQL
    engine_version: "8.0"
    volume_type: ULTRAHIGH
    ha_mode: true
    replication_mode: async
  _iam: &iam
    iam_policy:
      allowed_actions:
        - rds:instance:get
        - rds:instance:list
        - rds:backup:*
        - rds:database:*
      resource_scope: "acs:rds:*:*:instance/*"
  _sg: &sg
    security_group_rules:
      ingress:
        - protocol: TCP
          port: 3306
          source: sg-app-servers-xxxxx
      egress:
        - protocol: TCP
          port: 3306
          destination: sg-app-servers-xxxxx

metadata:
  <<: *base
  environment: production

instance:
  <<: *engine
  flavor_ref: rds.mysql.s1.xlarge
  volume_size: 200

network:
  vpc_id: vpc-prod-xxxxx
  subnet_id: subnet-prod-private-xxxxx
  security_group_id: sg-rds-mysql-prod-xxxxx
  availability_zone: cn-north-4a,cn-north-4b

backup:
  auto_enabled: true
  start_time: "02:00-03:00"
  keep_days: 7
  cross_region_enabled: false

security:
  ssl_enabled: true
  tde_enabled: true
  require_secure_transport: true
  min_password_length: 12

monitoring:
  ces_enabled: true
  alarm_enabled: true
  metrics:
    - cpu_usage
    - mem_usage
    - connections_usage
    - disk_usage
    - slow_queries
    - iops

alerts:
  cpu:
    warning: 80
    critical: 95
    duration_minutes: 5
  memory:
    warning: 85
    critical: 95
    duration_minutes: 5
  connections:
    warning: 80
    critical: 90
    duration_minutes: 5
  disk:
    warning: 85
    critical: 95
    duration_minutes: 2
  slow_queries:
    warning: 10
    critical: 50
    duration_minutes: 5

finops:
  cost_center_tag: "CC-PROD-001"
  environment_tag: "prod"
  budget_alert_threshold: 0.8
  idle_detection:
    cpu_threshold: 5
    days_threshold: 7
    action: notify
  right_sizing:
    cpu_low_threshold: 20
    mem_low_threshold: 30
    days_threshold: 14
    action: recommend

secops:
  <<: *iam
  <<: *sg
  credential_rotation_days: 90

aiops:
  anomaly_detection:
    enabled: true
    patterns:
      - name: cpu_mem_dual_high
        metrics:
          - rds001_cpu_usage
          - rds002_mem_usage
        condition: "cpu > 80 AND mem > 85"
        severity: critical
      - name: slow_query_spike
        metrics:
          - rds043_slow_queries
        condition: "delta(10min) > 50%"
        severity: warning
  proactive_inspection:
    enabled: true
    schedule: "0 2 * * *"
    scope: all_instances
  alarm_storm:
    enabled: true
    threshold_per_5min: 10
    aggregation_window_minutes: 5
```

