# Example Configuration — Huawei Cloud IAM

> **Purpose:** Example YAML configuration for IAM skill with FinOps, SecOps, and AIOps settings.
> **Version:** 1.0.0
> **Last Updated:** 2026-05-20

> **YAML anchors**: A `_base: &base` anchor captures shared values (IAM endpoint,
> incident response policy, common password rules). Environments override only
> what differs. `<<: *base` merges the anchor into the active block.

---

## Environment: Production

```yaml
# huaweicloud-iam-ops/config/production.yaml

_base: &base
  metadata:
    version: "1.0.0"
    last_updated: "2026-05-20"
  iam:
    endpoint: "https://iam.myhuaweicloud.com"
    domain_id: "{{env.HW_DOMAIN_ID}}"
  incident_response: &incident_response
    compromised_ak_sk: "disable_immediately"
    unauthorized_access: "revoke_permissions"
    brute_force: "lock_account"
  password_rules: &password_rules
    require_uppercase: true
    require_lowercase: true
    require_numbers: true
    require_special_chars: true
    history_count: 5

metadata:
  <<: *base
  environment: production

groups:
  - name: administrators
    description: "Account administrators with MFA"
    policies: [IAM-FullAccess, Security-Audit-Policy]
  - name: developers
    description: "Development team"
    policies: [ECS-ReadOnly-Custom, RDS-ReadOnly-Custom]
  - name: operators
    description: "Operations team"
    policies: [ECS-Operator-Custom, RDS-Operator-Custom, CES-Operator-Custom]
  - name: auditors
    description: "Security audit team"
    policies: [ReadOnlyAccess, CTS-FullAccess]

security:
  mfa_enforced: true
  password_policy:
    <<: *password_rules
    min_length: 12
    expire_days: 90
  ak_sk_rotation_days: 90
  session_timeout_minutes: 480

monitoring:
  cts_enabled: true
  alert_on_mfa_disable: true
  alert_on_ak_sk_creation: true
  alert_on_user_deletion: true
  brute_force_threshold: 5
  brute_force_window_minutes: 5

finops:
  cost_center_tag: "CC-PROD-001"
  environment_tag: "prod"
  permission_audit:
    enabled: true
    schedule: "0 9 * * MON"  # Weekly Monday 9 AM
    stale_key_threshold_days: 90
    stale_account_threshold_days: 180

secops:
  zero_trust:
    mfa_required: true
    least_privilege: true
    credential_rotation_days: 90
  incident_response:
    <<: *incident_response
  compliance_automation:
    mfa_check: daily
    policy_audit: weekly
    credential_rotation_check: daily

aiops:
  anomaly_detection:
    enabled: true
    patterns:
      - name: permission_creep
        condition: "policy_count_growth > 20% over 30 days"
        severity: warning
      - name: unused_credentials
        condition: "ak_sk_not_used > 90 days"
        severity: warning
      - name: stale_accounts
        condition: "no_login > 180 days"
        severity: warning
      - name: brute_force
        condition: "login_failures > 5 in 5 min"
        severity: critical
      - name: privilege_escalation
        condition: "admin_policy_attached without change_request"
        severity: critical
  proactive_inspection:
    enabled: true
    schedule: "0 2 * * *"  # Daily at 2 AM
    scope: all_users_and_policies
```

