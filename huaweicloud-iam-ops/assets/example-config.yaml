## Credential Rotation Profile

```yaml
# huaweicloud-iam-ops/config/credential-rotation.yaml

_base: &rotation_workflow
  steps:
    - name: create_new_credential
      action: create
      verify: true
    - name: update_applications
      action: manual
      timeout_minutes: 60
    - name: verify_new_credential
      action: test
      verify: true
    - name: delete_old_credential
      action: delete
      require_confirmation: true
    - name: audit_rotation
      action: log
      cts_trace: true

metadata:
  profile: credential-rotation
  version: "1.0.0"

rotation:
  ak_sk:
    enabled: true
    rotation_days: 90
    grace_period_days: 7
    auto_notify: true
    notification_days_before: 14
  password:
    enabled: true
    rotation_days: 90
    enforce_on_login: true
  mfa:
    review_days: 365
    re_register_on_compromise: true

workflow:
  <<: *rotation_workflow
```

