## Environment: Development

```yaml
# huaweicloud-iam-ops/config/development.yaml

_base: &base
  metadata:
    version: "1.0.0"
    last_updated: "2026-05-20"
  iam:
    endpoint: "https://iam.myhuaweicloud.com"
    domain_id: "{{env.HW_DOMAIN_ID}}"
  incident_response: &incident_response
    compromised_ak_sk: "disable_and_notify"
    unauthorized_access: "notify_only"
    brute_force: "notify_only"
  password_rules: &password_rules
    require_uppercase: false
    require_lowercase: true
    require_numbers: true
    require_special_chars: false

metadata:
  <<: *base
  environment: development

groups:
  - name: dev-admins
    description: "Development administrators"
    policies: [IAM-FullAccess]
  - name: dev-team
    description: "Development team"
    policies: [ECS-FullAccess, RDS-FullAccess]

security:
  mfa_enforced: false
  password_policy:
    <<: *password_rules
    min_length: 8
    expire_days: 365
  ak_sk_rotation_days: 365

monitoring:
  cts_enabled: true
  alert_on_mfa_disable: false
  alert_on_ak_sk_creation: false
  brute_force_threshold: 20

finops:
  cost_center_tag: "CC-DEV-001"
  environment_tag: "dev"
  permission_audit:
    enabled: false

secops:
  zero_trust:
    mfa_required: false
    least_privilege: false
    credential_rotation_days: 365
  incident_response:
    <<: *incident_response

aiops:
  anomaly_detection:
    enabled: false
  proactive_inspection:
    enabled: false
```

